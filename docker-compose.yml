version: '3.8'
services:
  backend:
    build: ./backend
    container_name: llmstore-backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend/models_catalog:/app/models_catalog
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: llmstore-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: llmstore-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-models:
